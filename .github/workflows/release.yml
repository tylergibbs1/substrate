name: Release

# Push a tag like v0.3.0 to build installers on all three platforms and publish
# them to a GitHub Release (electron-builder --publish). Unsigned for now — add
# CSC_* / Apple notarization secrets when certs are available.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the web app + bundle the server into a single self-contained .mjs.
      - run: pnpm build:dist

      # Package the platform installer (dmg / nsis / AppImage), sign it if certs
      # are configured (else build unsigned), and upload to the GitHub Release.
      #
      # Optional repo secrets to enable signing — until they're set, builds are
      # unsigned and this step still works:
      #   macOS:   MAC_CSC_LINK (base64 of the Developer ID .p12), MAC_CSC_KEY_PASSWORD
      #            APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID  (notarization)
      #   Windows: WIN_CSC_LINK (base64 of the .pfx), WIN_CSC_KEY_PASSWORD
      - name: Package + publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.MAC_CSC_LINK || (runner.os == 'Windows' && secrets.WIN_CSC_LINK || '') }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MAC_CSC_KEY_PASSWORD || (runner.os == 'Windows' && secrets.WIN_CSC_KEY_PASSWORD || '') }}
          # Notarization auth — App Store Connect API key (preferred, like CodexBar)
          # or the Apple-ID + app-specific-password fallback. All empty = no notarize.
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          args="--publish always"
          # No signing cert on this platform → build unsigned, don't probe the keychain.
          if [ -z "$CSC_LINK" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            # Force-skip mac signing: a hardened-runtime config + the CI runner's
            # keychain otherwise make electron-builder attempt (and fail) to sign.
            [ "${{ runner.os }}" = "macOS" ] && args="$args -c.mac.identity=null"
          fi
          # An App Store Connect API key (.p8) is the cleanest notarytool auth — no
          # 2FA / app-specific password. Write it to a file electron-builder reads.
          if [ -n "${APPLE_API_KEY_P8:-}" ]; then
            printf '%s' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/asc_api_key.p8"
            export APPLE_API_KEY="$RUNNER_TEMP/asc_api_key.p8"
          fi
          # Notarize macOS only when a cert AND some notarization auth are present.
          if [ "${{ runner.os }}" = "macOS" ] && [ -n "$CSC_LINK" ] && { [ -n "${APPLE_API_KEY:-}" ] || [ -n "${APPLE_ID:-}" ]; }; then
            args="$args -c.mac.notarize=true"
          fi
          pnpm --filter @substrate/desktop exec electron-builder $args
